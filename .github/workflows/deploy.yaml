name: RetailMex — Deploy Data Platform

on:
  push:
    branches:
      - main        # corre cuando hay push a main (producción)
      - staging     # corre cuando hay push a staging
  pull_request:
    branches:
      - main        # corre en PRs hacia main — valida antes de mergear


env:
  AWS_REGION: us-east-1
  GLUE_SCRIPTS_BUCKET: retailmex-glue-scripts
  # El ambiente depende del branch
  # main → prod, staging → staging, cualquier otro → dev
  ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'prod' || github.ref == 'refs/heads/staging' && 'staging' || 'dev' }}

jobs:

  validate:
    name: Validar código e infraestructura
    runs-on: ubuntu-latest

    steps:
      # 1. Bajar el código del repo
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instalar Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          pip install cfn-lint pytest pyspark==3.5.0

      # 4. Validar el template CloudFormation
      # cfn-lint detecta errores de sintaxis y configuraciones inválidas
      # antes de intentar desplegar 
      - name: Lint CloudFormation
        run: |
          cfn-lint infrastructura/cloudformation.yaml

      # 5. Correr tests del pipeline PySpark
      - name: Tests PySpark
        run: |
          pytest pyspark/tests/ -v

  deploy:
    name: Desplegar infraestructura a AWS
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Configurar AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Subir scripts PySpark a S3
        run: |
          aws s3 sync pyspark/ s3://${{ env.GLUE_SCRIPTS_BUCKET }}/scripts/ \
            --exclude "*" \
            --include "*.py"
      - name: Desplegar CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file infrastructura/cloudformation.yaml \
            --stack-name retailmex-data-platform-${{ env.ENVIRONMENT }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=${{ env.ENVIRONMENT }} \
              GlueScriptsBucket=${{ env.GLUE_SCRIPTS_BUCKET }}